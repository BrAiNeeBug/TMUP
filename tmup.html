<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMUP — Tasmota Mass Update</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script>
const LANG = {
  de: {
    subtitle:     "Tasmota Massen-Update · Web Interface",
    netRange:     "Netzwerk-Bereich",
    labelBase:    "IP-Basis",
    labelStart:   "Start",
    labelEnd:     "Ende",
    auth:         "Authentifizierung",
    labelUser:    "Benutzername",
    labelPass:    "Passwort",
    labelTimeout: "Max. Timeout (ms)",
    btnUpdate:    "▶ UPDATE",
    btnStop:      "■ STOP",
    btnClear:     "CLR",
    clearTitle:   "Log leeren",
    logTitle:     "Ausgabe-Log",
    statusIdle:   "bereit",
    statusRun:    "läuft",
    statusStop:   "stoppe…",
    logReady:     "── TMUP bereit. Netzwerkbereich konfigurieren und UPDATE drücken. ──",
    logCleared:   "── Log geleert. ──",
    logStart:     (base,s,e,n) => `── Starte Update: ${base}.${s} → ${base}.${e} (${n} Hosts) ──`,
    logSent:      ip => `  ✓ ${ip}  → Upgrade gesendet`,
    logAborted:   "── Abgebrochen durch Benutzer. ──",
    logDone:      (s,t) => `\n── FERTIG  ✓ ${s}/${t} Befehle gesendet ──`,
  },
  en: {
    subtitle:     "Tasmota Mass Update · Web Interface",
    netRange:     "Network Range",
    labelBase:    "IP Base",
    labelStart:   "Start",
    labelEnd:     "End",
    auth:         "Authentication",
    labelUser:    "Username",
    labelPass:    "Password",
    labelTimeout: "Max. Timeout (ms)",
    btnUpdate:    "▶ UPDATE",
    btnStop:      "■ STOP",
    btnClear:     "CLR",
    clearTitle:   "Clear log",
    logTitle:     "Output Log",
    statusIdle:   "idle",
    statusRun:    "running",
    statusStop:   "stopping…",
    logReady:     "── TMUP ready. Configure network range and press UPDATE. ──",
    logCleared:   "── Log cleared. ──",
    logStart:     (base,s,e,n) => `── Starting update: ${base}.${s} → ${base}.${e} (${n} hosts) ──`,
    logSent:      ip => `  ✓ ${ip}  → upgrade sent`,
    logAborted:   "── Aborted by user. ──",
    logDone:      (s,t) => `\n── DONE  ✓ ${s}/${t} commands sent ──`,
  }
};

let currentLang = localStorage.getItem("tmup_lang") || "de";

function t(key, ...args) {
  const v = LANG[currentLang][key];
  return typeof v === "function" ? v(...args) : v;
}

function applyLang() {
  document.documentElement.lang = currentLang;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll("[data-i18n-title]").forEach(el => {
    el.title = t(el.dataset.i18nTitle);
  });
  const btn = document.getElementById("langBtn");
  if (btn) btn.textContent = currentLang === "de" ? "EN" : "DE";
}

function toggleLang() {
  currentLang = currentLang === "de" ? "en" : "de";
  localStorage.setItem("tmup_lang", currentLang);
  applyLang();
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0c0f;
    --surface: #111419;
    --border:  #1e2530;
    --accent:  #00e5a0;
    --accent2: #00b8ff;
    --warn:    #ff6b35;
    --text:    #c8d6e5;
    --muted:   #4a5568;
    --success: #00e5a0;
    --error:   #ff4f6d;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 24px 16px 40px;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,229,160,0.06) 0%, transparent 70%),
      linear-gradient(180deg, #0a0c0f 0%, #0c0f13 100%);
  }

  header {
    max-width: 680px;
    margin: 0 auto 28px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 6px;
  }

  .logo-text {
    font-family: 'Space Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,160,0.4);
  }

  .logo-tag {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
  }

  .subtitle {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  #langBtn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    flex-shrink: 0;
    align-self: center;
  }
  #langBtn:hover {
    color: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(0,229,160,0.15);
  }

  .card {
    max-width: 680px;
    margin: 0 auto 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .card-header {
    padding: 10px 16px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    flex-shrink: 0;
  }

  .card-body { padding: 20px; }

  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field-grid.triple { grid-template-columns: 2fr 1fr 1fr; }
  .field { display: flex; flex-direction: column; gap: 5px; }

  label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  input {
    background: rgba(0,0,0,0.4);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 9px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.1);
  }

  .btn-row { margin-top: 20px; display: flex; gap: 10px; }

  button {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 11px 24px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }

  #toggleBtn {
    flex: 1;
    background: var(--accent);
    color: #0a0c0f;
    text-transform: uppercase;
  }
  #toggleBtn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  #toggleBtn:hover::after { transform: translateX(100%); }
  #toggleBtn:hover { background: #00ffb2; box-shadow: 0 0 20px rgba(0,229,160,0.4); }
  #toggleBtn.running {
    background: var(--warn);
    box-shadow: 0 0 20px rgba(255,107,53,0.3);
    animation: pulse-warn 1.6s ease-in-out infinite;
  }
  @keyframes pulse-warn {
    0%, 100% { box-shadow: 0 0 10px rgba(255,107,53,0.3); }
    50%       { box-shadow: 0 0 24px rgba(255,107,53,0.6); }
  }

  #clearBtn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 11px 16px;
  }
  #clearBtn:hover { color: var(--text); border-color: var(--muted); }

  .log-wrap {
    max-width: 680px;
    margin: 0 auto 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .log-header {
    padding: 10px 16px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .status-pill { display: flex; align-items: center; gap: 5px; font-size: 10px; }
  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  pre#log {
    background: #080a0d;
    padding: 16px;
    height: 22vh;
    overflow-y: auto;
    font-size: 12.5px;
    line-height: 1.7;
    color: #7a9ab8;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  pre#log::-webkit-scrollbar { width: 4px; }
  pre#log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-ok   { color: var(--success); }
  .log-err  { color: var(--error); }
  .log-info { color: var(--accent2); }
  .log-done { color: var(--accent); font-weight: 600; }
  .log-head { color: var(--muted); }

  footer {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    padding-top: 4px;
  }
  footer a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
  footer a:hover { color: var(--accent); }

  @media (max-width: 520px) {
    .field-grid, .field-grid.triple { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">
      <span class="logo-text">TMUP</span>
      <span class="logo-tag">v1.3</span>
    </div>
    <div class="subtitle" data-i18n="subtitle"></div>
  </div>
  <button id="langBtn" onclick="toggleLang()">EN</button>
</header>

<div class="card">
  <div class="card-header">
    <span class="dot"></span>
    <span data-i18n="netRange"></span>
  </div>
  <div class="card-body">
    <div class="field-grid triple">
      <div class="field">
        <label data-i18n="labelBase"></label>
        <input id="ipbase" value="192.168.2">
      </div>
      <div class="field">
        <label data-i18n="labelStart"></label>
        <input id="start" value="200" type="number" min="0" max="254">
      </div>
      <div class="field">
        <label data-i18n="labelEnd"></label>
        <input id="end" value="210" type="number" min="1" max="255">
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <span class="dot" style="background:var(--accent2);box-shadow:0 0 6px var(--accent2)"></span>
    <span data-i18n="auth"></span>
  </div>
  <div class="card-body">
    <div class="field-grid">
      <div class="field">
        <label data-i18n="labelUser"></label>
        <input id="user" value="admin">
      </div>
      <div class="field">
        <label data-i18n="labelPass"></label>
        <input id="pass" type="password" placeholder="••••••••">
      </div>
    </div>
    <div style="margin-top:14px">
      <div class="field" style="max-width:220px">
        <label data-i18n="labelTimeout"></label>
        <input id="timeout" value="3000" type="number">
      </div>
    </div>
    <div class="btn-row">
      <button id="toggleBtn" onclick="toggleUpdate()"></button>
      <button id="clearBtn" onclick="clearLog()" data-i18n-title="clearTitle"></button>
    </div>
  </div>
</div>

<div class="log-wrap">
  <div class="log-header">
    <span data-i18n="logTitle"></span>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText"></span>
    </div>
  </div>
  <pre id="log"></pre>
</div>

<footer>
  <span>© 2025 BrAiNee</span>
  <a href="https://github.com/BrAiNeeBug/TMUP" target="_blank">github.com</a>
</footer>

<script>
const logEl      = document.getElementById("log");
const statusDot  = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");

function appendLog(msg, cls = "") {
  const span = document.createElement("span");
  if (cls) span.className = cls;
  span.textContent = msg + "\n";
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() {
  logEl.innerHTML = '';
  appendLog(t("logCleared"), "log-head");
}

function setStatus(active, key) {
  statusDot.classList.toggle("active", active);
  statusText.textContent = t(key);
}

function refreshButtons() {
  const btn = document.getElementById("toggleBtn");
  btn.textContent = running ? t("btnStop") : t("btnUpdate");
  document.getElementById("clearBtn").textContent = t("btnClear");
}

const sleep = ms => new Promise(r => setTimeout(r, ms));
let stopFlag = false;
let running  = false;

async function call(ip, cmd, u, p) {
  return new Promise(resolve => {
    const timer = setTimeout(() => resolve(false), +document.getElementById("timeout").value);
    fetch(`http://${ip}/cm?user=${u}&password=${p}&cmnd=${encodeURIComponent(cmd)}`)
      .then(() => { clearTimeout(timer); resolve(true); })
      .catch(() => { clearTimeout(timer); resolve(false); });
  });
}

async function update() {
  running  = true;
  stopFlag = false;
  const btn = document.getElementById("toggleBtn");
  btn.textContent = t("btnStop");
  btn.classList.add("running");
  setStatus(true, "statusRun");

  const base = document.getElementById("ipbase").value,
        s    = +document.getElementById("start").value,
        e    = +document.getElementById("end").value,
        u    = document.getElementById("user").value,
        p    = document.getElementById("pass").value;

  const total = e - s + 1;
  appendLog(t("logStart", base, s, e, total), "log-info");

  let sent = 0;
  for (let i = s; i <= e; i++) {
    if (stopFlag) { appendLog(t("logAborted"), "log-err"); break; }
    const ip = `${base}.${i}`;
    await call(ip, "upgrade 1", u, p);
    appendLog(t("logSent", ip), "log-ok");
    sent++;
    await sleep(80);
  }

  if (!stopFlag) appendLog(t("logDone", sent, total), "log-done");

  btn.textContent = t("btnUpdate");
  btn.classList.remove("running");
  setStatus(false, "statusIdle");
  running = false;
}

function toggleUpdate() {
  if (running) {
    stopFlag = true;
    setStatus(false, "statusStop");
  } else {
    update();
  }
}

// Override applyLang to also refresh dynamic button labels
const _applyLang = applyLang;
window.applyLang = function() {
  _applyLang();
  refreshButtons();
};

const PERSIST_FIELDS = ["ipbase", "start", "end", "user", "timeout"];

function saveFields() {
  PERSIST_FIELDS.forEach(id => {
    localStorage.setItem("tmup_" + id, document.getElementById(id).value);
  });
}

function loadFields() {
  PERSIST_FIELDS.forEach(id => {
    const v = localStorage.getItem("tmup_" + id);
    if (v !== null) document.getElementById(id).value = v;
  });
}

window.addEventListener("DOMContentLoaded", () => {
  loadFields();
  PERSIST_FIELDS.forEach(id => {
    document.getElementById(id).addEventListener("input", saveFields);
  });
  applyLang();
  setStatus(false, "statusIdle");
  appendLog(t("logReady"), "log-head");
});
</script>
</body>
</html>
